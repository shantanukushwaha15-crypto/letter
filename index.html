<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Love Letter ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div class="background-hearts"></div>

<div class="container">

    <div id="envelope">

        <!-- Letter -->

        <div class="letter">

            <img src="1779947854755.jpg" class="photo" alt="Photo">

            <h2>To:Jaaneman ❤️</h2>

            <p>
                Pyari lag rahi hena apse bhi nazr mt lagana🧿.Warna pitti pitti kar dunga.
            </p>

            <p>
                Jalna nhi kyunki apse acchi hain.
            </p>

            <p>
                Is photo ki taraha humesha smile karna. <br>
                Acchi lagti hon ap or ap to Adorable one hon na.
            </p>

            <h3>❤️LOVE YOU ❤️</h3>

        </div>
<div class="floating-hearts">
    <span class="f-heart h1"></span>.
    <span class="f-heart h2"></span>
    <span class="f-heart h3"></span>
    <span class="f-heart h4"></span>
    <span class="f-heart h5"></span>
</div>
        <!-- Back -->

        <div class="back"></div>

        <!-- Left -->

        <div class="left"></div>

        <!-- Right -->

        <div class="right"></div>

        <!-- Bottom -->

        <div class="bottom"></div>

        <!-- Flap -->

        <div class="flap"></div>

    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>

<script src="script.js"></script>

</body>

</html>
